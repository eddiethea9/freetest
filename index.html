<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .maintenance {
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 10vw, 4rem);
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 2px;
    }

    @media (max-width: 600px) {
      h1 {
        letter-spacing: 1px;
      }
    }
  </style>
</head>
<body>
  <div class="Maintenance">
    <h1>MAINTENANCE</h1>
  </div>
</body>
</html>
